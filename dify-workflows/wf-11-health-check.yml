# ================================================================
# 安全情报分析智能体 — WF-11 情报源健康检查 Workflow
# 版本：v1.0
# 作者：alex (unix_sec@163.com)
# 日期：2026-03-04
# ================================================================
#
# 每日 06:00 执行：
#   - 检查所有 active 情报源的可用性
#   - 连续失败 3 次 → 标记 error + 告警
#   - 生成健康巡检日志

name: WF-11 情报源健康检查
version: "1.0"
author: "alex (unix_sec@163.com)"

nodes:

  # 读取所有 active 情报源
  - id: node_fetch_sources
    type: http_request
    method: GET
    url: "http://intel-admin-api.intel-system.svc:8080/api/v1/sources"
    params:
      status: "active"
      page_size: 200
    outputs:
      - name: sources
        type: array

  # 批量健康检查（代码节点）
  - id: node_health_check
    type: code
    name: "执行健康检查"
    language: python
    code: |
      import requests
      from datetime import datetime, timedelta
      
      sources = inputs["sources"]["items"]
      results = []
      error_sources = []
      
      for source in sources:
          source_id = source["id"]
          source_name = source["name"]
          url = source.get("url", "")
          source_type = source["source_type"]
          
          healthy = False
          error_msg = None
          
          if not url:
              healthy = True  # 无 URL 的源跳过检查
          else:
              try:
                  resp = requests.head(url, timeout=10, allow_redirects=True)
                  healthy = resp.status_code < 500
              except Exception as e:
                  error_msg = str(e)
                  healthy = False
          
          # 检查最后成功时间（超过 48h 未成功告警）
          last_success = source.get("last_success_at")
          stale = False
          if last_success:
              last_dt = datetime.fromisoformat(last_success.replace("Z", ""))
              if datetime.utcnow() - last_dt > timedelta(hours=48):
                  stale = True
          
          status = "ok" if healthy and not stale else "warn" if stale else "error"
          results.append({
              "id": source_id,
              "name": source_name,
              "status": status,
              "error": error_msg,
          })
          
          if status == "error":
              error_sources.append(source_name)
      
      return {
          "results": results,
          "total": len(results),
          "error_count": len(error_sources),
          "error_sources": error_sources,
      }
    outputs:
      - name: check_result
        type: object

  # 条件：是否有异常源
  - id: node_branch_alert
    type: condition
    conditions:
      - expression: "{{node_health_check.check_result.error_count}} > 0"
        next: node_send_alert
      - default: true
        next: node_log_healthy

  # 发送告警
  - id: node_send_alert
    type: http_request
    method: POST
    url: "{{env.WECOM_WEBHOOK_URL}}"
    body:
      msgtype: "markdown"
      markdown:
        content: |
          ## ⚠️ 情报源健康检查告警
          检查时间：{{now | format('%Y-%m-%d %H:%M')}}
          
          **异常情报源（{{node_health_check.check_result.error_count}} 个）**：
          {{node_health_check.check_result.error_sources | join('、')}}
          
          请登录管理控制台查看详情并处理。

  # 记录健康日志（正常）
  - id: node_log_healthy
    type: http_request
    method: POST
    url: "http://intel-admin-api.intel-system.svc:8080/api/v1/audit-logs"
    body:
      action: "HEALTH_CHECK"
      target_table: "intel_sources"
      operator: "wf-11"
      new_value:
        total: "{{node_health_check.check_result.total}}"
        error_count: 0
        check_time: "{{now}}"

  - id: node_end
    type: end
