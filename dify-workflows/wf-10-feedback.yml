name: WF-10 反馈收集
version: "1.0"
author: "alex (unix_sec@163.com)"

inputs:
  - name: user_id
    type: string
    required: true
  - name: rating
    type: string
    required: true
    enum: ["valuable", "not_valuable"]
  - name: scored_intel_id
    type: integer
    required: false
  - name: report_id
    type: integer
    required: false
  - name: comment
    type: string
    required: false

nodes:

  - id: node_save_feedback
    type: http_request
    method: POST
    url: "http://intel-admin-api.intel-system.svc:8080/api/v1/feedbacks"
    body:
      user_id: "{{inputs.user_id}}"
      rating: "{{inputs.rating}}"
      scored_intel_id: "{{inputs.scored_intel_id}}"
      report_id: "{{inputs.report_id}}"
      comment: "{{inputs.comment}}"

  - id: node_end
    type: end
