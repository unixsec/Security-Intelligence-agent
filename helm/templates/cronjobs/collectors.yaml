---
# 日报调度
apiVersion: batch/v1
kind: CronJob
metadata:
  name: scheduler-daily-report
  namespace: {{ .Values.namespace }}
spec:
  schedule: {{ .Values.schedulers.daily.schedule | quote }}
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: trigger
              image: curlimages/curl:latest
              command:
                - /bin/sh
                - -c
                - |
                  curl -X POST \
                    http://dify-api.{{ .Values.namespace }}.svc.cluster.local:5001/v1/workflows/run \
                    -H "Authorization: Bearer $(DIFY_API_KEY)" \
                    -H "Content-Type: application/json" \
                    -d "{\"inputs\":{\"report_type\":\"daily\",\"report_date\":\"$(date +%Y-%m-%d)\"},\"user\":\"scheduler\"}"
              env:
                - name: DIFY_API_KEY
                  valueFrom:
                    secretKeyRef:
                      name: dify-api-credentials
                      key: api-key
                - name: TZ
                  value: {{ .Values.timezone }}

---
# 健康检查调度
apiVersion: batch/v1
kind: CronJob
metadata:
  name: scheduler-health-check
  namespace: {{ .Values.namespace }}
spec:
  schedule: {{ .Values.schedulers.healthCheck.schedule | quote }}
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: trigger
              image: curlimages/curl:latest
              command:
                - /bin/sh
                - -c
                - |
                  curl -X POST \
                    http://dify-api.{{ .Values.namespace }}.svc.cluster.local:5001/v1/workflows/run \
                    -H "Authorization: Bearer $(DIFY_API_KEY)" \
                    -H "Content-Type: application/json" \
                    -d "{\"inputs\":{},\"user\":\"scheduler\"}"
              env:
                - name: DIFY_API_KEY
                  valueFrom:
                    secretKeyRef:
                      name: dify-api-credentials
                      key: api-key
