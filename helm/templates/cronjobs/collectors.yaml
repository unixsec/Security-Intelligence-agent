---
# RSS 采集器
apiVersion: batch/v1
kind: CronJob
metadata:
  name: collector-rss
  namespace: {{ .Values.namespace }}
  labels:
    app: collector-rss
    component: collector
spec:
  schedule: {{ .Values.collectors.rss.schedule | quote }}
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 5
  jobTemplate:
    spec:
      backoffLimit: 2
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: rss-collector
              image: "{{ .Values.imageRegistry }}/{{ .Values.images.rssCollector.repository }}:{{ .Values.images.rssCollector.tag }}"
              imagePullPolicy: {{ .Values.imagePullPolicy }}
              env:
                - name: MYSQL_HOST
                  value: "mysql-primary.{{ .Values.namespace }}.svc.cluster.local"
                - name: MYSQL_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: mysql-credentials
                      key: password
                - name: MYSQL_USER
                  valueFrom:
                    secretKeyRef:
                      name: mysql-credentials
                      key: username
                - name: DIFY_API_BASE
                  value: "http://dify-api.{{ .Values.namespace }}.svc.cluster.local:5001/v1"
                - name: DIFY_API_KEY
                  valueFrom:
                    secretKeyRef:
                      name: dify-api-credentials
                      key: api-key
                - name: MILVUS_HOST
                  value: "milvus-standalone.{{ .Values.namespace }}.svc.cluster.local"
                - name: TZ
                  value: {{ .Values.timezone }}
              resources:
                requests:
                  cpu: {{ .Values.collectors.rss.resources.requests.cpu }}
                  memory: {{ .Values.collectors.rss.resources.requests.memory }}
                limits:
                  cpu: {{ .Values.collectors.rss.resources.limits.cpu }}
                  memory: {{ .Values.collectors.rss.resources.limits.memory }}

