# ================================================================
# 安全情报分析智能体 — K8s Secrets 模板
# 版本：v1.0
# 作者：alex (unix_sec@163.com)
# ================================================================
# 警告：本模板中的密钥值为占位符，必须在部署前通过 values-prod.yaml
#       或 kubectl create secret 命令替换为真实凭证。

---
apiVersion: v1
kind: Secret
metadata:
  name: mysql-credentials
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: security-intel-agent
type: Opaque
stringData:
  username: "intel_admin"
  password: "REPLACE_WITH_REAL_MYSQL_PASSWORD"
  connection-string: "mysql://intel_admin:REPLACE@mysql-primary:3306/intel_system"

---
apiVersion: v1
kind: Secret
metadata:
  name: llm-credentials
  namespace: {{ .Values.namespace }}
type: Opaque
stringData:
  api-key: "REPLACE_WITH_LLM_API_KEY"

---
apiVersion: v1
kind: Secret
metadata:
  name: search-api-credentials
  namespace: {{ .Values.namespace }}
type: Opaque
stringData:
  api-key: "REPLACE_WITH_360_SEARCH_API_KEY"

---
apiVersion: v1
kind: Secret
metadata:
  name: wecom-bot-credentials
  namespace: {{ .Values.namespace }}
type: Opaque
stringData:
  bot-token: "REPLACE_WITH_WECOM_BOT_TOKEN"
  webhook-url: "REPLACE_WITH_WECOM_WEBHOOK_URL"

---
apiVersion: v1
kind: Secret
metadata:
  name: smtp-credentials
  namespace: {{ .Values.namespace }}
type: Opaque
stringData:
  host: "mail.internal.company.com"
  port: "587"
  username: "intel-agent@company.com"
  password: "REPLACE_WITH_SMTP_PASSWORD"

---
apiVersion: v1
kind: Secret
metadata:
  name: sms-gw-credentials
  namespace: {{ .Values.namespace }}
type: Opaque
stringData:
  gateway-url: "REPLACE_WITH_SMS_GATEWAY_URL"
  token: "REPLACE_WITH_SMS_GATEWAY_TOKEN"
  p0-recipients: "REPLACE_WITH_P0_PHONE_NUMBERS_COMMA_SEPARATED"

---
apiVersion: v1
kind: Secret
metadata:
  name: dify-api-credentials
  namespace: {{ .Values.namespace }}
type: Opaque
stringData:
  api-key: "REPLACE_WITH_DIFY_API_KEY"
