{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: intel-ingress
  namespace: {{ .Values.namespace }}
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "120"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "120"
spec:
  ingressClassName: {{ .Values.ingress.className }}
  rules:
    - host: {{ .Values.ingress.hosts.adminWeb }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: intel-admin-web
                port:
                  number: 80
    - host: {{ .Values.ingress.hosts.adminApi }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: intel-admin-api
                port:
                  number: 8080
{{- end }}
